syntax = "proto3";

option csharp_namespace = "Microservice.Contracts.Product.Protos";
// ChangeProduct
message ChangeProductRequestDto{
	int32 ProductId = 1;
	int64 NewPrice = 2;
	string Desction = 3;
}

message ChangeProductResponceDto{
	bool IsApplied = 1;
}

message GetProductDataRequestDto{
	string ProductId = 1;
}
message GetProductDataResponceDto{
	int64 Price = 2; 
}
service  ProductService {
	rpc ChangeProduct(ChangeProductRequestDto) returns(ChangeProductResponceDto);
	rpc GetProductData(GetProductDataRequestDto) returns (GetProductDataResponceDto);
}